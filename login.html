<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adult Toys Store</title>
    <link rel="stylesheet" href="css_style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Adult Toys Store</a>
            <div class="nav-links">
                <a href="products.html">Products</a>
                <a href="favourites.html">Favourites</a>
                <a href="cart.html">Cart <span id="cart-count">0</span></a>
                <a href="login.html" id="login-logout-btn">Login</a>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-box">
            <h2>Login / Register</h2>
            
            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="reg-email">Email:</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password (min 6 characters):</label>
                    <input type="password" id="reg-password" minlength="6" required>
                </div>
                <button type="submit" class="btn-secondary">Register</button>
            </form>

            <div id="auth-message" class="auth-message"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js_firebase-config.js"></script>
    <script src="js_auth.js"></script>
    <script src="js_app.js"></script>
</body>
</html>
